apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        isDefault: true
        editable: true

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo:3200
        editable: true
        jsonData:
          httpMethod: GET
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
          tracesToMetrics:
            datasourceUid: prometheus
            tags:
              - key: service.name
                value: service
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true

      - name: Loki
        type: loki
        uid: loki
        url: http://loki:3100
        editable: true
        jsonData:
          derivedFields:
            - name: traceID
              matcherRegex: '"traceId":"(\w+)"'
              url: "${__value.raw}"
              datasourceUid: tempo
              urlDisplayLabel: View Trace
