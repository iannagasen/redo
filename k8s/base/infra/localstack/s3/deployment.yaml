apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack-pro:latest
          ports:
            - containerPort: 4566
          env:
            - name: SERVICES
              value: "s3"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: LOCALSTACK_HOST
              value: "localhost.localstack.cloud:4566"
            - name: EXTRA_CORS_ALLOWED_ORIGINS
              value: "https://app.localstack.cloud"
            - name: LOCALSTACK_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: localstack-secret
                  key: auth-token
            - name: PERSISTENCE
              value: "1"
          volumeMounts:
            - name: localstack-storage
              mountPath: /var/lib/localstack
      volumes:
        - name: localstack-storage
          persistentVolumeClaim:
            claimName: localstack-pvc
