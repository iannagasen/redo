apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: auth
  name: auth-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth
    spec:
      initContainers:
        - name: ensure-db
          image: postgres:17-alpine
          command: ['sh', '-c']
          args:
            - |
              until pg_isready -h postgres -U product_user; do echo "Waiting for postgres..."; sleep 2; done
              psql -h postgres -U product_user -d product_catalog -tc "SELECT 1 FROM pg_database WHERE datname = 'user_management'" | grep -q 1 \
                || psql -h postgres -U product_user -d product_catalog -c "CREATE DATABASE user_management;" || true
          env:
            - name: PGPASSWORD
              value: "product_password"
      containers:
        - name: authserver
          image: auth:latest
          imagePullPolicy: Never # recommended for local development
          ports:
            - containerPort: 8080
            - containerPort: 5005
              name: debug
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
          envFrom:
            - configMapRef:
                name: backend-url-configmap
