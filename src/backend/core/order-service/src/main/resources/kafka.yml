spring.kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  consumer:
    group-id: order-service
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    enable-auto-commit: false
    properties:
      spring.json.trusted.packages: "dev.agasen.api.events.payment"
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: false

system:
  topics:
    checkout:
      order:
        created: checkout.order.created
        confirmed: checkout.order.confirmed
        cancelled: checkout.order.cancelled
        failed: checkout.order.failed
      payment:
        processed: checkout.payment.processed
        refunded: checkout.payment.refunded
        declined: checkout.payment.declined
      cart:
        cleared: checkout.cart.cleared
        restored: checkout.cart.restored

---
spring.config.activate.on-profile: docker
spring.kafka.bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}