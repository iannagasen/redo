spring:
  application:
    name: order-service
  config:
    import:
      - classpath:observability.yml
      - classpath:persistence.yml
      - classpath:springdoc.yml
      - classpath:database.yml
      - classpath:kafka.yml

server:
  port: 8083
  servlet:
    context-path: /order

env.base.url.internal.auth: ${INTERNAL_AUTH_SERVER_BASE_URL:http://localhost:8080/auth}
env.base.url.internal.product: ${INTERNAL_PRODUCT_SERVICE_BASE_URL:http://localhost:8081/product}
env.base.url.internal.payment: ${INTERNAL_PAYMENT_SERVICE_BASE_URL:http://localhost:8085/payment}

logging.level.dev.agasen.core.order: DEBUG

---
spring.config.activate.on-profile: docker
spring.kafka.bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
