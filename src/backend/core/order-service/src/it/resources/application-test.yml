spring:
  datasource:
    url: jdbc:h2:mem:order_test;DB_CLOSE_DELAY=-1;NON_KEYWORDS=value
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  liquibase:
    enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      properties:
        # Trust both PaymentEvent subtypes and OrderCheckoutSagaEvent subtypes
        spring.json.trusted.packages: "dev.agasen.platform.contracts.events.payment,dev.agasen.platform.contracts.events.order"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Enable type headers in tests so the consumer's JsonDeserializer can pick the correct subtype
        # (e.g. PaymentEvent$Processed vs PaymentEvent$Declined) without a fixed default type.
        spring.json.add.type.headers: true

# Fake auth URL — SecurityConfig reads this to build the JWK Set URI.
# Kafka tests never make HTTP requests, so the JWK endpoint is never contacted.
env:
  base:
    url:
      internal:
        auth: http://localhost:9999
        payment: http://localhost:9999
        product: http://localhost:9999

system:
  topics:
    checkout:
      order:
        created: checkout.order.created
        confirmed: checkout.order.confirmed
        cancelled: checkout.order.cancelled
        failed: checkout.order.failed
      payment:
        processed: checkout.payment.processed
        refunded: checkout.payment.refunded
        declined: checkout.payment.declined
      cart:
        cleared: checkout.cart.cleared
        restored: checkout.cart.restored

logging:
  level:
    dev.agasen: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
