spring:
  application:
    name: product-service
  config:
    import:
      - classpath:observability.yml
      - classpath:persistence.yml
      - classpath:springdoc.yml
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/product_catalog?currentSchema=public&stringtype=unspecified
    username: product_user
    password: product_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1
  data:
    redis:
      host: redis
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${EXTERNAL_AUTH_SERVER_BASE_URL:http://localhost:8080}

server:
  port: 8081
  servlet:
    context-path: /product

env.base.url:
  internal:
    auth: ${INTERNAL_AUTH_SERVER_BASE_URL:http://localhost:8080}
    product: ${INTERNAL_PRODUCT_SERVICE_BASE_URL:http://localhost:8081}
  external:
    auth: ${EXTERNAL_AUTH_SERVER_BASE_URL:http://localhost:8080}
    product: ${EXTERNAL_PRODUCT_SERVICE_BASE_URL:http://localhost:8081}

auth:
  authorizationUrl: ${EXTERNAL_AUTH_SERVER_BASE_URL:http://localhost:8080}/oauth2/authorize
  tokenUrl: ${EXTERNAL_AUTH_SERVER_BASE_URL:http://localhost:8080}/oauth2/token

# Product-service specific springdoc extras (base config is in springdoc.yml)
springdoc.swagger-ui:
  oauth2-redirect-url: ${EXTERNAL_PRODUCT_SERVICE_BASE_URL:http://localhost:8081}/swagger-ui/oauth2-redirect.html
  display-request-duration: true
  operations-sorter: method
  oauth:
    client-id: swagger-ui
    client-secret: swagger-secret
    use-basic-authentication-with-access-code-grant: true
    scopes: openid

logging:
  level:
    org.springframework.jdbc: TRACE
    org.springframework.data.jdbc: TRACE
    dev.agasen.core.product: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

storage:
  s3:
    bucket-name: shopbuddy-products
    region: us-east-1
    base-url: http://localhost:4566/shopbuddy-products
    endpoint-override: http://localhost:4566

---
spring.config.activate.on-profile: docker
server.port: 8080

spring.data.redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}

storage:
  s3:
    endpoint-override: http://localstack:4566
    base-url: http://localhost:4566/shopbuddy-products
